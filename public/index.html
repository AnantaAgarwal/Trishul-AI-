<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRISHUL AI — Secure Access</title>

<link rel="stylesheet" href="login.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

</head>
<body>

<div class="background-grid"></div>

<div class="login-container">

  <div class="system-title">
    🔱 TRISHUL AI
  </div>

  <div class="system-sub">
    DEFENCE COMMAND INTERFACE
  </div>

  <div class="access-panel">
    <div class="panel-title">
      SECURE ACCESS TERMINAL
    </div>

    <div class="warning">
      ⚠ Authorized Personnel Only
    </div>

    
    <form id="login-form">

      <input 
        type="text" 
        id="username" 
        placeholder="USERNAME" 
        required
      >

      <input 
        type="password" 
        id="password" 
        placeholder="PASSWORD" 
        required
      >

      <button type="submit" class="login-btn">
        AUTHENTICATE
      </button>

    </form>

    
    <div id="auth-message" class="auth-msg" style="display:none;"></div>

    
    <div id="device-info" style="margin-top:10px;font-size:12px;color:#0ff;"></div>

  </div>

  <div class="footer">
    TRISHUL AI // TEAM 2BYTES // ENCRYPTED CHANNEL ACTIVE
  </div>

</div>


<script src="./auth.js"></script>
<script src="./login.js"></script>

</body>
</html>
